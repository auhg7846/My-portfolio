<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afzal Electronic — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E14;
    --bg-elevated:#10151F;
    --surface:#151C29;
    --bubble-user:#0F2A30;
    --border:#232D3F;
    --text:#E7ECF3;
    --text-muted:#8B96A8;
    --cyan:#00E5FF;
    --cyan-dim:rgba(0,229,255,0.14);
    --amber:#FFB100;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .app{
    width:100%;
    max-width:480px;
    height:88vh;
    max-height:760px;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,229,255,0.05);
  }
  .app__header{
    padding:18px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--surface);
  }
  .app__avatar{
    width:38px; height:38px;
    border-radius:10px;
    background:var(--cyan-dim);
    border:1px solid var(--cyan);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--cyan);
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
  }
  .app__title{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:0.98rem; }
  .app__status{
    font-size:0.74rem;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .app__status .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 6px var(--cyan);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .chat::-webkit-scrollbar{ width:6px; }
  .chat::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }

  .msg{
    max-width:82%;
    padding:11px 15px;
    border-radius:12px;
    font-size:0.92rem;
    line-height:1.5;
    animation:rise 0.25s ease both;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  .msg--bot{
    background:var(--surface);
    border:1px solid var(--border);
    align-self:flex-start;
    border-top-left-radius:4px;
  }
  .msg--user{
    background:var(--bubble-user);
    border:1px solid #1A4A52;
    color:var(--text);
    align-self:flex-end;
    border-top-right-radius:4px;
  }
  .msg--error{
    background:rgba(255,90,90,0.08);
    border:1px solid rgba(255,90,90,0.3);
    color:#FF8A8A;
    align-self:flex-start;
  }

  .typing{
    display:flex;
    gap:4px;
    padding:13px 16px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    align-self:flex-start;
    width:fit-content;
  }
  .typing span{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--cyan);
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:0.5; } 30%{ transform:translateY(-4px); opacity:1; } }

  .chips{
    display:flex;
    gap:8px;
    padding:0 20px 14px;
    flex-wrap:wrap;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:0.74rem;
    color:var(--cyan);
    background:var(--cyan-dim);
    border:1px solid rgba(0,229,255,0.3);
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    transition:background 0.2s ease;
  }
  .chip:hover{ background:rgba(0,229,255,0.25); }

  .app__input{
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid var(--border);
    background:var(--surface);
  }
  .app__input input{
    flex:1;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 14px;
    border-radius:8px;
    font-size:0.92rem;
    font-family:'Inter', sans-serif;
  }
  .app__input input:focus{ outline:none; border-color:var(--cyan); }
  .app__input button{
    background:var(--cyan);
    color:#04161A;
    border:none;
    padding:0 20px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    font-size:0.92rem;
    transition:opacity 0.2s ease;
  }
  .app__input button:disabled{ opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<div class="app">
  <div class="app__header">
    <div class="app__avatar">AE</div>
    <div>
      <div class="app__title">Afzal Electronic</div>
      <div class="app__status"><span class="dot"></span>AI Assistant · Online</div>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="msg msg--bot">Hi! I'm the Afzal Electronic assistant. Ask me about our products, store hours, or anything else — I'm happy to help.</div>
  </div>

  <div class="chips" id="chips">
    <div class="chip" data-q="What are your store hours?">Store hours?</div>
    <div class="chip" data-q="Do you sell air conditioners?">AC units?</div>
    <div class="chip" data-q="Do you have phone screen protectors?">Screen protectors?</div>
  </div>

  <div class="app__input">
    <input type="text" id="userInput" placeholder="Type your question..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const chips = document.getElementById('chips');

  const SYSTEM_PROMPT = `You are the customer support AI assistant for Afzal Electronic, a local electronics shop.

Store details:
- Sells: mobile phones & accessories, home appliances (fridges, ACs, washing machines), gadgets & electronics, spare parts & accessories (cables, batteries, adapters)
- Hours: Monday to Saturday, 10:00 AM to 9:00 PM. Closed Sundays.
- Accepts cash and card. Delivery available.

Answer customer questions in a friendly, concise way (2-4 sentences max). If asked about exact prices or live stock, say you can't confirm exact numbers right now but invite them to check via WhatsApp or visit the store. Stay on topic — you only handle questions related to Afzal Electronic and its products/services.`;

  let history = [];

  function addMessage(text, type){
    const div = document.createElement('div');
    div.className = 'msg msg--' + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping(){
    const el = document.getElementById('typingIndicator');
    if(el) el.remove();
  }

  async function sendMessage(text){
    if(!text.trim()) return;
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;
    chips.style.display = 'none';
    showTyping();

    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });
      const data = await response.json();
      removeTyping();

      const reply = data.content?.map(b => b.text || '').join('').trim() || "Sorry, I couldn't process that — please try again.";
      addMessage(reply, 'bot');
      history.push({ role: 'assistant', content: reply });
    }catch(err){
      removeTyping();
      addMessage("Connection issue — please try again in a moment.", 'error');
      console.error('AI agent error:', err);
    }finally{
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(input.value); });
  chips.addEventListener('click', (e) => {
    if(e.target.classList.contains('chip')) sendMessage(e.target.dataset.q);
  });
</script>

</body>
</html>
